name: Valida blocklist

on:
  push:
    paths:
      - "data/**"
      - "scripts/**"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"

jobs:
  valida:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Valida il CSV
        run: python3 scripts/valida.py
